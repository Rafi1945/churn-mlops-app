name: Churn MLOps CI CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-train-build-push-update-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data quality tests
        run: |
          pytest tests/test_data_quality.py

      - name: Train churn model
        run: |
          python -m src.train

      - name: Run model quality tests
        run: |
          pytest tests/test_model_quality.py

      - name: Run API tests
        run: |
          pytest tests/test_api.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image with commit and latest tags
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-mlops-api:${{ github.sha }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-mlops-api:latest .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-mlops-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-mlops-api:latest

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: Rafi1945/churn-mlops-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: churn-mlops-gitops
          persist-credentials: true

      - name: Update Kubernetes deployment image tag
        run: |
          cd churn-mlops-gitops
          sed -i "s|image: .*churn-mlops-api:.*|image: ${{ secrets.DOCKER_USERNAME }}/churn-mlops-api:${{ github.sha }}|" apps/churn-api/deployment.yaml

      - name: Commit and push GitOps change
        run: |
          cd churn-mlops-gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/churn-api/deployment.yaml
          git commit -m "Update churn API image to ${{ github.sha }}" || echo "No changes to commit"
          git push origin main